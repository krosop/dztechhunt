name: Daily PC Parts Scraper

on:
  # Run every day at 3:00 AM UTC (off-peak for most sites)
  schedule:
    - cron: '0 3 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      sites:
        description: 'Sites to scrape (licbplus, wifidjelfa, or all)'
        required: true
        default: 'all'
      categories:
        description: 'Specific categories (comma-separated, or leave blank for all)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Scrapling browsers
        run: |
          scrapling install chromium

      - name: Run scraper
        run: |
          SITES="${{ github.event.inputs.sites || 'all' }}"
          CATS="${{ github.event.inputs.categories }}"

          if [ -n "$CATS" ]; then
            python run.py --sites $SITES --cats $CATS
          else
            python run.py --sites $SITES
          fi

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/
          git add docs/data/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Update prices: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-data-${{ github.run_id }}
          path: |
            data/raw/
            data/history/
            docs/data/
          retention-days: 7
