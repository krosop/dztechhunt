<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Parts Price Tracker — Algeria</title>
    <style>
        :root {
            --bg: #0a0e1a;
            --bg2: #121929;
            --bg3: #1e293b;
            --bg4: #334155;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --accent: #38bdf8;
            --accent2: #0284c7;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sale: #f97316;
            --border: rgba(148,163,184,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Header */
        header { text-align: center; padding: 40px 20px 20px; }
        header h1 { font-size: 2.2rem; margin-bottom: 8px; letter-spacing: -0.5px; }
        header h1 span { color: var(--accent); }
        header p { color: var(--text2); font-size: 1rem; }
        .last-updated { color: var(--text2); font-size: 0.85rem; margin-top: 10px; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin: 25px 0; }
        .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 15px; text-align: center; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
        .stat-card .label { color: var(--text2); font-size: 0.82rem; margin-top: 4px; }
        .stat-card .sublabel { color: var(--sale); font-size: 0.78rem; margin-top: 3px; }

        /* Controls */
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; padding: 15px; background: var(--bg2); border-radius: 10px; border: 1px solid var(--border); align-items: end; }
        .control-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
        .control-group label { font-size: 0.78rem; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
        input, select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg3); color: var(--text); font-size: 0.9rem; outline: none; width: 100%; }
        input:focus, select:focus { border-color: var(--accent); }
        .btn { padding: 9px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-weight: 500; transition: all 0.15s; background: var(--bg4); color: var(--text); border: 1px solid var(--border); }
        .btn:hover { background: var(--accent); color: #000; }
        .btn.active { background: var(--accent); color: #000; }
        .btn-sale.active { background: var(--sale); }
        .btn-stock.active { background: var(--success); }

        /* Tabs */
        .tabs { display: flex; flex-wrap: wrap; gap: 6px; margin: 18px 0; }
        .tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; background: var(--bg2); border: 1px solid var(--border); color: var(--text2); font-size: 0.85rem; transition: all 0.15s; }
        .tab:hover { border-color: var(--accent); color: var(--text); }
        .tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
        .tab .count { opacity: 0.7; font-size: 0.75rem; }

        /* Products */
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .product { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: all 0.2s; position: relative; }
        .product:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .badges { position: absolute; top: 8px; left: 8px; display: flex; gap: 4px; flex-wrap: wrap; z-index: 2; }
        .badge { padding: 3px 8px; border-radius: 5px; font-size: 0.68rem; font-weight: 700; }
        .badge-sale { background: var(--sale); color: #fff; }
        .badge-used { background: var(--warning); color: #000; }
        .badge-tray { background: var(--bg4); color: var(--text); }
        .badge-cat { background: var(--accent); color: #000; }
        .badge-oos { background: var(--danger); color: #fff; }
        .img-wrap { height: 180px; display: flex; align-items: center; justify-content: center; background: var(--bg); font-size: 2.5rem; }
        .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .pinfo { padding: 14px; }
        .pretailer { font-size: 0.75rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .pname { font-size: 0.88rem; font-weight: 600; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
        .pspecs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        .stag { padding: 2px 7px; border-radius: 4px; font-size: 0.72rem; background: rgba(56,189,248,0.08); color: var(--accent); border: 1px solid rgba(56,189,248,0.15); }
        .pprice { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
        .price-now { font-size: 1.25rem; font-weight: 700; color: var(--success); }
        .price-old { font-size: 0.9rem; color: var(--text2); text-decoration: line-through; }
        .price-save { font-size: 0.78rem; color: var(--sale); font-weight: 600; }
        .pactions { display: flex; gap: 6px; margin-top: 10px; }
        .pactions a, .pactions button { flex: 1; text-align: center; text-decoration: none; }
        .empty { grid-column: 1 / -1; text-align: center; padding: 60px; color: var(--text2); }

        /* Comparison */
        .comparison { margin: 40px 0; }
        .comparison h2 { font-size: 1.3rem; margin-bottom: 10px; }
        .comparison > p { color: var(--text2); font-size: 0.88rem; margin-bottom: 15px; }
        .comptable { width: 100%; border-collapse: collapse; background: var(--bg2); border-radius: 10px; overflow: hidden; font-size: 0.85rem; }
        .comptable th, .comptable td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        .comptable th { background: var(--bg3); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); }
        .comptable tr:hover { background: rgba(56,189,248,0.04); }
        .comptable .pbest { color: var(--success); font-weight: 700; }
        .comptable .save { color: var(--sale); font-weight: 600; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; max-width: 550px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 25px; position: relative; }
        .modal-close { position: absolute; top: 12px; right: 14px; background: none; border: none; color: var(--text2); font-size: 1.4rem; cursor: pointer; }
        .sg { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 12px; }
        .si { background: var(--bg); padding: 10px; border-radius: 8px; }
        .si .sl { font-size: 0.75rem; color: var(--text2); }
        .si .sv { font-size: 0.95rem; font-weight: 600; color: var(--accent); }

        @media (max-width: 768px) {
            header h1 { font-size: 1.6rem; }
            .products { grid-template-columns: 1fr; }
            .sg { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modal"><button class="modal-close" onclick="closeModal()">&times;</button><div id="modalBody"></div></div></div>

<header>
    <h1>PC Parts <span>Price Tracker</span></h1>
    <p>Compare PC component prices across Algerian retailers</p>
    <div class="last-updated" id="lastUpdated"></div>
</header>

<div class="container">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="controls">
        <div class="control-group"><label>Search</label><input type="text" id="searchInput" placeholder="Product, brand, specs..." oninput="render()"></div>
        <div class="control-group"><label>Sort</label><select id="sortSelect" onchange="render()">
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
            <option value="savings">Biggest Savings</option>
            <option value="discount">Highest Discount %</option>
            <option value="name">Name A-Z</option>
        </select></div>
        <div class="control-group"><label>Retailer</label><select id="retailerFilter" onchange="render()"><option value="">All</option></select></div>
        <div class="control-group"><label>Brand</label><select id="brandFilter" onchange="render()"><option value="">All</option></select></div>
        <div class="control-group"><label>&nbsp;</label>
            <div style="display:flex; gap:6px;">
                <button class="btn btn-sale" id="btnSale" onclick="toggleFilter('sale')">🔥 On Sale</button>
                <button class="btn btn-stock" id="btnStock" onclick="toggleFilter('stock')">✓ In Stock</button>
            </div>
        </div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="products" id="products"></div>

    <div class="comparison" id="compSection" style="display:none">
        <h2>🔍 Cross-Retailer Comparison</h2>
        <p>Same product found at multiple retailers — compare prices side by side</p>
        <div style="overflow-x:auto"><table class="comptable" id="compTable"></table></div>
    </div>
</div>

    try {

    init();
}

    ];

}

// ─── INIT ───
function init() {
    populateFilters();
    renderTabs();
    render();
    renderComparison();
    document.getElementById('lastUpdated').textContent = stats.scraped_at
        ? '📅 Last updated: ' + new Date(stats.scraped_at).toLocaleString()
        : '📅 Demo data loaded';
}

function populateFilters() {
    const retailers = [...new Set(allProducts.map(p => p.retailer_name))];
    const brands = [...new Set(allProducts.map(p => p.brand))].sort();
    document.getElementById('retailerFilter').innerHTML = '<option value="">All Retailers</option>' + retailers.map(r => `<option value="${r}">${r}</option>`).join('');
    document.getElementById('brandFilter').innerHTML = '<option value="">All Brands</option>' + brands.map(b => `<option value="${b}">${b}</option>`).join('');
}

// ─── TABS ───
function renderTabs() {
    const cats = {};
    allProducts.forEach(p => { cats[p.category] = (cats[p.category] || 0) + 1; });
    const sorted = Object.entries(cats).sort((a,b) => b[1] - a[1]);
    let html = `<div class="tab ${activeCat === 'all' ? 'active' : ''}" onclick="setCat('all')">All <span class="count">${allProducts.length}</span></div>`;
    sorted.forEach(([cat, count]) => {
        html += `<div class="tab ${activeCat === cat ? 'active' : ''}" onclick="setCat('${cat}')">${CAT_ICONS[cat] || '📋'} ${cat.toUpperCase()} <span class="count">${count}</span></div>`;
    });
    document.getElementById('tabs').innerHTML = html;
}
function setCat(c) { activeCat = c; renderTabs(); render(); }

// ─── FILTERS ───
function toggleFilter(f) {
    filters[f] = !filters[f];
    document.getElementById('btnSale').classList.toggle('active', filters.sale);
    document.getElementById('btnStock').classList.toggle('active', filters.stock);
    render();
}

function getFiltered() {
    let p = [...allProducts];
    const search = document.getElementById('searchInput').value.toLowerCase();
    const sort = document.getElementById('sortSelect').value;
    const retailer = document.getElementById('retailerFilter').value;
    const brand = document.getElementById('brandFilter').value;

    if (activeCat !== 'all') p = p.filter(x => x.category === activeCat);
    if (search) p = p.filter(x => (x.name + ' ' + x.brand + ' ' + JSON.stringify(x.specs)).toLowerCase().includes(search));
    if (retailer) p = p.filter(x => x.retailer_name === retailer);
    if (brand) p = p.filter(x => x.brand === brand);
    if (filters.sale) p = p.filter(x => x.old_price);
    if (filters.stock) p = p.filter(x => x.availability && !x.availability.toLowerCase().includes('out'));

    switch(sort) {
        case 'price-asc': p.sort((a,b) => (a.price||0) - (b.price||0)); break;
        case 'price-desc': p.sort((a,b) => (b.price||0) - (a.price||0)); break;
        case 'savings': p.sort((a,b) => ((b.old_price||0)-(b.price||0)) - ((a.old_price||0)-(a.price||0))); break;
        case 'discount': p.sort((a,b) => calcDiscount(b) - calcDiscount(a)); break;
        case 'name': p.sort((a,b) => a.name.localeCompare(b.name)); break;
    }
    return p;
}

function calcDiscount(p) {
    if (!p.old_price || !p.price || p.old_price <= p.price) return 0;
    return Math.round(((p.old_price - p.price) / p.old_price) * 100);
}

// ─── RENDER ───
function render() {
    const products = getFiltered();
    const el = document.getElementById('products');

    // Stats
    const prices = products.filter(p => p.price).map(p => p.price);
    const avg = prices.length ? Math.round(prices.reduce((a,b) => a+b, 0) / prices.length) : 0;
    const onSale = products.filter(p => p.old_price).length;
    const retailers = [...new Set(products.map(p => p.retailer_name))].length;

    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="value">${products.length}</div><div class="label">Products</div></div>
        <div class="stat-card"><div class="value">${avg.toLocaleString()}</div><div class="label">Avg Price (DA)</div></div>
        <div class="stat-card"><div class="value">${onSale}</div><div class="label">On Sale</div>${onSale ? `<div class="sublabel">🔥 Deals</div>` : ''}</div>
        <div class="stat-card"><div class="value">${retailers}</div><div class="label">Retailers</div></div>
    `;

    if (!products.length) { el.innerHTML = '<div class="empty"><h3>No products found</h3><p>Try adjusting your filters</p></div>'; return; }

    el.innerHTML = products.map(p => {
        const specs = Object.entries(p.specs || {}).slice(0, 5);
        const specTags = specs.map(([k,v]) => `<span class="stag">${SPEC_LABELS[k] || k}: ${v}</span>`).join('');
        const badges = [];
        if (p.old_price) badges.push('<span class="badge badge-sale">-' + calcDiscount(p) + '%</span>');
        if (p.condition === 'Used') badges.push('<span class="badge badge-used">USED</span>');
        if (p.condition === 'Tray/OEM') badges.push('<span class="badge badge-tray">TRAY</span>');
        badges.push(`<span class="badge badge-cat">${p.category.toUpperCase()}</span>`);
        if (p.availability && p.availability.toLowerCase().includes('out')) badges.push('<span class="badge badge-oos">OOS</span>');

        const savings = p.old_price ? p.old_price - p.price : 0;

        return `<div class="product">
            <div class="badges">${badges.join('')}</div>
            <div class="img-wrap">${CAT_ICONS[p.category] || '📋'}</div>
            <div class="pinfo">
                <div class="pretailer">${p.retailer_name} • ${p.brand}</div>
                <div class="pname">${p.name}</div>
                <div class="pspecs">${specTags}</div>
                <div class="pprice">
                    <span class="price-now">${p.price_formatted}</span>
                    ${p.old_price_formatted ? `<span class="price-old">${p.old_price_formatted}</span>` : ''}
                </div>
                ${savings > 0 ? `<div class="price-save">💰 Save ${savings.toLocaleString()} DA</div>` : ''}
                <div class="pactions">
                    <a href="${p.url}" target="_blank" class="btn" style="background:var(--accent);color:#000">View →</a>
                    <button class="btn" onclick="showSpecs('${p.sku}')">Specs</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ─── COMPARISON ───
function renderComparison() {
    if (!comparisons || !comparisons.length) return;
    document.getElementById('compSection').style.display = '';
    const retailers = [...new Set(comparisons.flatMap(c => c.listings.map(l => l.retailer)))];

    let html = '<thead><tr><th>Product</th><th>Specs</th>' + retailers.map(r => `<th>${r}</th>`).join('') + '<th>Save</th></tr></thead><tbody>';
    comparisons.slice(0, 20).forEach(c => {
        const specSummary = Object.entries(c.specs || {}).slice(0, 2).map(([k,v]) => `${SPEC_LABELS[k] || k}: ${v}`).join(', ');
        html += '<tr>';
        html += `<td><strong>${c.name.slice(0, 55)}</strong><br><small>${c.brand}</small></td>`;
        html += `<td><small>${specSummary}</small></td>`;
        retailers.forEach(r => {
            const l = c.listings.find(x => x.retailer === r);
            if (l) {
                const isBest = l.price === Math.min(...c.listings.filter(x => x.price).map(x => x.price));
                html += `<td class="${isBest ? 'pbest' : ''}">${l.price_formatted || 'N/A'}</td>`;
            } else html += `<td style="color:var(--text2)">—</td>`;
        });
        html += `<td class="save">${c.savings > 0 ? c.savings.toLocaleString() + ' DA' : '—'}</td>`;
        html += '</tr>';
    });
    html += '</tbody>';
    document.getElementById('compTable').innerHTML = html;
}

// ─── MODAL ───
function showSpecs(sku) {
    const p = allProducts.find(x => x.sku === sku);
    if (!p) return;
    const specs = Object.entries(p.specs || {});
    const savings = (p.old_price || 0) - (p.price || 0);
    document.getElementById('modalBody').innerHTML = `
        <h2>${p.name}</h2>
        <p style="color:var(--text2);margin:8px 0">${p.brand} • ${p.retailer_name} • ${p.category.toUpperCase()}</p>
        <div class="pprice" style="margin:15px 0">
            <span class="price-now" style="font-size:1.6rem">${p.price_formatted}</span>
            ${p.old_price_formatted ? `<span class="price-old" style="font-size:1.1rem">${p.old_price_formatted}</span>` : ''}
        </div>
        ${savings > 0 ? `<div style="color:var(--sale);font-weight:600;margin-bottom:10px">💰 Save ${savings.toLocaleString()} DA (${calcDiscount(p)}% off)</div>` : ''}
        <h3 style="margin-top:20px">Specifications</h3>
        ${specs.length ? `<div class="sg">${specs.map(([k,v]) => `<div class="si"><div class="sl">${SPEC_LABELS[k] || k}</div><div class="sv">${v}</div></div>`).join('')}</div>` : '<p style="color:var(--text2)">No detailed specs</p>'}
        <div style="margin-top:20px;display:flex;gap:8px">
            <a href="${p.url}" target="_blank" class="btn" style="background:var(--accent);color:#000">🛒 View at ${p.retailer_name}</a>
        </div>`;
    document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target.id === 'modalOverlay') closeModal(); });

// ─── START ───
loadData();
</script>
