name: Deploy to Vercel (Manual Backup)
#
# MANUAL BACKUP DEPLOYMENT
# This workflow is a backup for when Vercel auto-deploy fails.
# The normal flow is: scrape.yml commits data → Vercel auto-deploys automatically.
#
# REQUIRED SECRETS (set in GitHub Settings → Secrets → Actions):
#   VERCEL_TOKEN      — from Vercel Account Settings → Tokens
#   VERCEL_ORG_ID     — from your Vercel dashboard URL: vercel.com/<org-id>
#   VERCEL_PROJECT_ID — from Vercel Project Settings → General
#

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  check-secrets:
    name: Verify Vercel Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          missing=""
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && missing="VERCEL_TOKEN $missing"
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && missing="VERCEL_ORG_ID $missing"
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && missing="VERCEL_PROJECT_ID $missing"
          if [ -n "$missing" ]; then
            echo "❌ MISSING SECRETS: $missing"
            echo ""
            echo "Set these in GitHub: Settings → Secrets → Actions"
            echo "Get them from Vercel: https://vercel.com/account/tokens"
            exit 1
          fi
          echo "✅ All Vercel secrets configured"

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: check-secrets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          ENV_FLAG="${{ github.event.inputs.environment == 'production' && '--prod' || '' }}"
          echo "Deploying with environment: ${{ github.event.inputs.environment }}"
          vercel deploy --prebuilt $ENV_FLAG \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --org-id=${{ secrets.VERCEL_ORG_ID }} \
            --project-id=${{ secrets.VERCEL_PROJECT_ID }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
