name: Daily Scrape + Convert (Hybrid Pipeline)
#
# ═══════════════════════════════════════════════════════════════════════════════
#  HYBRID SCRAPE ARCHITECTURE — DZ TechHunt
# ═══════════════════════════════════════════════════════════════════════════════
#
#  ┌─────────────────────┐     ┌─────────────────────┐
#  │  YOUR LOCAL MACHINE │     │   GITHUB ACTIONS    │
#  │   (run manually)    │     │   (runs daily 3:17) │
#  └──────────┬──────────┘     └──────────┬──────────┘
#             │                             │
#    scrape-ouedkniss-local.py              │
#    → ouedkniss-raw.json                   │
#    → merge-ouedkniss.py                    │
#    → adapter_v2.py (8 stores)              │
#             │                             │
#    ─────────┴────────────┬────────────────┘
#                          │
#                          ▼
#              ┌─────────────────────┐
#              │  public/clean-       │
#              │  products.json       │
#              │  public/data/        │
#              │  products.json       │
#              └──────────┬──────────┘
#                         │
#                         │ git push
#                         ▼
#              ┌─────────────────────┐
#              │      VERCEL         │
#              │  (auto-deploys on   │
#              │   every push)       │
#              └─────────────────────┘
#
#  OUEDKNISS → Must run locally (Ouedkniss blocks GitHub Actions IPs)
#  8 STORES  → Run on GitHub Actions (GeekZone, GamingDZ, LICB Plus, etc.)
#
#  LOCAL WORKFLOW (run when you want fresh Ouedkniss data):
#    1. python scripts/scrape-ouedkniss-local.py
#    2. python scripts/merge-ouedkniss.py
#    3. node scripts/convert-data-enhanced.js
#    4. git add public/clean-products.json public/data/products.json
#    5. git commit -m "data: update Ouedkniss products"
#    6. git push  → Vercel auto-deploys
#
# ═══════════════════════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: "17 3 * * *"  # 3:17 AM UTC daily (off-peak for Algerian stores)
  workflow_dispatch:
    inputs:
      run_cleanup:
        description: 'Run Supabase cleanup (requires secrets)'
        required: false
        default: false
        type: boolean

jobs:
  scrape:
    name: Scrape 8 Stores + Convert
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── Node.js Setup ───
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node.js dependencies
        run: npm install --legacy-peer-deps

      # ─── Python Setup ───
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          cd scripts/pc-parts-scraper
          pip install -r requirements.txt

      # ─── Run Scraper V2 (8 non-Ouedkniss stores) ───
      # NOTE: Ouedkniss is NOT scraped here — blocked by IP.
      # Run scripts/scrape-ouedkniss-local.py on your machine instead.
      - name: Run Scraper V2 (8 stores)
        run: cd scripts && python adapter_v2.py
        env:
          PYTHONIOENCODING: utf-8

      # ─── Convert data for frontend (with taxonomy) ───
      - name: Convert to DZ TechHunt format
        run: node scripts/convert-data-enhanced.js

      # ─── Upload artifacts for debugging ───
      - name: Upload results artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results-${{ github.run_id }}
          path: |
            public/clean-products.json
            public/data/products.json
            public/data/taxonomy-cache.json
          retention-days: 3

      # ─── Commit updated data (triggers Vercel auto-deploy) ───
      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add public/clean-products.json public/data/products.json public/data/taxonomy-cache.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: daily scrape $(date -u +%Y-%m-%d)"
            git push
            echo "✅ Data committed — Vercel auto-deploy will trigger"
          fi

  cleanup:
    name: Cleanup Expired Data (Optional)
    runs-on: ubuntu-latest
    needs: scrape
    # Only run if explicitly requested or if secrets are available
    if: ${{ github.event.inputs.run_cleanup == true || (github.event_name == 'schedule' && secrets.SUPABASE_URL != '') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Node.js dependencies
        run: npm install --legacy-peer-deps
      - name: Run cleanup
        run: node scripts/cleanup.cjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
